<style>
  :root {
    --bg-0: #07080d;
    --bg-1: #0b0d15;
    --bg-2: #0f1220;
    --bg-3: #161a29;
    --line: rgba(148, 163, 184, 0.08);

    --accent: #9d4edd;
    --accent-2: #9d4edd;
    --accent-gradient: #9d4edd;
    --accent-fg: #1a0833;
    --accent-glow: rgba(157, 78, 221, 0.45);
  }

  html, body { background: var(--bg-0); color: #e6e8f0; font-family: 'Inter', system-ui, sans-serif; }
  .font-display { font-family: 'Rajdhani', sans-serif; letter-spacing: 0.02em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  /* Soft atmospheric backdrop — less grid noise, more Notion-y warmth */
  body::before {
    content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1200px 700px at 18% -10%, color-mix(in oklab, var(--accent) 22%, transparent), transparent 60%),
      radial-gradient(900px 600px at 110% 30%, color-mix(in oklab, var(--accent-2) 14%, transparent), transparent 60%),
      radial-gradient(1100px 500px at 50% 130%, rgba(255,255,255,0.025), transparent 60%);
  }

  #__bg-image-layer {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-size: cover; background-position: center;
    display: none;
  }

  /* Range slider */
  input[type="range"].aether {
    -webkit-appearance: none; appearance: none;
    height: 4px; border-radius: 999px; outline: none;
    background: linear-gradient(to right, var(--accent) var(--pct,50%), rgba(148,163,184,0.18) var(--pct,50%));
  }
  input[type="range"].aether::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    cursor: pointer;
  }
  input[type="range"].aether::-moz-range-thumb {
    width: 14px; height: 14px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    cursor: pointer;
  }

  input[type="color"] { -webkit-appearance: none; appearance: none; border: none; padding: 0; cursor: pointer; }
  input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"]::-webkit-color-swatch { border: none; }
  input[type="color"]::-moz-color-swatch { border: none; }

  /* Pulse */
  @keyframes pulseRing {
    0%   { transform: scale(0.9); opacity: 0.9; }
    70%  { transform: scale(2.6); opacity: 0; }
    100% { transform: scale(0.9); opacity: 0; }
  }
  .pulse-ring::after {
    content: ""; position: absolute; inset: 0; border-radius: 9999px;
    background: currentColor; animation: pulseRing 1.8s ease-out infinite;
  }

  @keyframes flashWhite {
    0%   { background-color: rgba(255,255,255,0.0); }
    20%  { background-color: rgba(255,255,255,0.45); }
    100% { background-color: rgba(255,255,255,0.0); }
  }
  .flash-on-click { animation: flashWhite 0.35s ease-out; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(148,163,184,0.18); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(148,163,184,0.3); }

  .bar-fill { transition: height 200ms cubic-bezier(.2,.7,.2,1); }

  /* Smooth section fade-in */
  @keyframes sectionIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .section-anim { animation: sectionIn 320ms cubic-bezier(.2,.7,.2,1); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn {
    0%   { opacity: 0; transform: scale(0.92) translateY(8px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Soft card — Notion/Apple Health style: subtle elevation, soft edges */
  .surface {
    background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.015));
    border: 1px solid rgba(255,255,255,0.04);
    box-shadow:
      0 1px 0 rgba(255,255,255,0.04) inset,
      0 20px 60px -24px rgba(0,0,0,0.7),
      0 4px 16px -8px rgba(0,0,0,0.4);
  }
  .surface-flat {
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
  }

  /* Pill segmented nav */
  .pill-active {
    background: linear-gradient(180deg, color-mix(in oklab, var(--accent) 22%, transparent), color-mix(in oklab, var(--accent) 12%, transparent));
    color: white;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.12) inset,
      0 8px 24px -10px var(--accent-glow);
  }

  /* Dropdown menu */
  .menu-pop {
    background: rgba(20, 24, 38, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: 0 20px 60px -16px rgba(0,0,0,0.7);
  }
</style>
