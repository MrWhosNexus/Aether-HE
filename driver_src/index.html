<template id="mSlider">
    <style>
        :root{--slider-color: #feeefe}
        .sliderView { display: flex; align-items: center; flex: 1; }
        .sliderView .labSlider { flex: 1; width: 100%; }
        .sliderView .labSlider input[type="range"] { width: 100%; height: 8px; border-radius: 4px; background: linear-gradient( to right, var(--slider-color) var(--fill-percent, 50%),#ddd var(--fill-percent, 50%) ); -webkit-appearance: none; appearance: none; cursor: pointer; position: relative; }
        .sliderView .labSlider input[type="range"]::-webkit-slider-runnable-track { height: 8px; border-radius: 4px; background: transparent; }
        .sliderView .labSlider input[type="range"]:disabled::-webkit-slider-runnable-track { background: linear-gradient(to right,#bbb var(--fill-percent, 50%),#777 var(--fill-percent, 50%)); }
        .sliderView .labSlider input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 20px; background: #fff; border-radius: 4px; box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.15); margin-top: -6px; cursor: pointer; border: 1px solid #ccc; transition: background-color 0.2s ease, box-shadow 0.2s ease; }
        .sliderView .labSlider input[type="range"]:disabled::-webkit-slider-thumb { background: #eee; border-color: #aaa; cursor: not-allowed; }
        .sliderView .btnView { display: flex;gap: 4px;margin-left: 12px; }
        .sliderView .btnView button, .numInputLabel { border-radius: 4px;border: 1px solid var(--border-color);background-color: var(--bg-color3);color: var(--font-color);font-weight: 600;height: 30px;padding: 0 10px;box-sizing: border-box;user-select: none;transition: background-color 0.2s ease, border-color 0.2s ease; }
        .sliderView .btnView button { width: 30px;cursor: pointer; }
        .sliderView .btnView button:active:not(:disabled) { background-color: #e0e0e0; }
        .sliderView .btnView button:disabled { cursor: not-allowed;opacity: 0.5; }
        .sliderView .btnView input[type="number"] { width: 35px;text-align: center;outline: none;border: none; background-color: transparent; color: var(--font-color); }
        .sliderView .btnView input[type="number"]::-webkit-inner-spin-button,
        .sliderView .btnView input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none;margin: 0; }
        .sliderView .btnView input[type="number"] { -moz-appearance: textfield; }
    </style>
    <div class="sliderView">
        <label class="labSlider">
            <input id="slider" tabindex="-1" type="range" max="100" min="0" value="50">
        </label>
        <div class="btnView">
            <button id="btnSub" tabindex="-1">-</button>
            <label class="numInputLabel">
                <input tabindex="-1" type="number" autocomplete="off" id="sliderEdit" class="numInput">mm
            </label>
            <button id="btnAdd" tabindex="-1">+</button>
        </div>
    </div>
</template>
