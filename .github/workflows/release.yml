name: Release

# Push a version tag to cut a release. From either OS:
#   1. bump __version__ in version.py
#   2. git tag v0.2.0 && git push origin v0.2.0
# This builds the Windows installer and the Linux Flatpak bundle and publishes
# them as assets on the GitHub Release for that tag. The in-app updater
# (updater.py) then offers the matching asset to every user on next check.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # allow a manual run from the Actions tab

permissions:
  contents: write           # create releases + upload assets

jobs:
  # ----------------------------------------------------------------- Windows --
  windows:
    runs-on: windows-latest
    timeout-minutes: 30        # vgamepad's MSI popup once hung CI for 6h; fail fast.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y
      - name: Fetch & patch vgamepad sdist (skip its msiexec UAC prompt)
        # vgamepad 0.1.0 ships only an sdist; its setup.py runs
        # `msiexec /i ViGEmBusSetup_x64.msi` on Windows, which pops a UAC dialog
        # nobody answers in CI → ~6-hour timeout. We ship ViGEmBus separately
        # via Inno Setup's [Run] block, so that driver-install line is dead
        # weight. The skip clause in vgamepad's setup.py only excludes
        # `egg_info` / `sdist`; modern pip metadata discovery runs `dist_info`,
        # which still triggers the popup. So we sidestep pip entirely: fetch
        # the tarball over plain HTTPS, neutralize the msiexec line, and only
        # then let pip install the patched directory.
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force vgsrc | Out-Null
          $url = "https://files.pythonhosted.org/packages/source/v/vgamepad/vgamepad-0.1.0.tar.gz"
          Invoke-WebRequest -Uri $url -OutFile vgsrc\vgamepad-0.1.0.tar.gz -UseBasicParsing
          tar -xzf vgsrc\vgamepad-0.1.0.tar.gz -C vgsrc
          $sp = "vgsrc\vgamepad-0.1.0\setup.py"
          (Get-Content $sp) `
            -replace "subprocess\.call\(\['msiexec'.*\)", "pass  # ViGEmBus installed by Inno Setup" `
            | Set-Content $sp
          Write-Output "--- patched setup.py msiexec line ---"
          Select-String -Path $sp -Pattern "msiexec|ViGEmBus installed" | ForEach-Object { $_.Line }
      - name: Create venv + install deps
        shell: cmd
        run: |
          py -3.12 -m venv venv-web || exit /b 1
          venv-web\Scripts\python -m pip install --upgrade pip || exit /b 1
          venv-web\Scripts\pip install --no-input vgsrc\vgamepad-0.1.0 || exit /b 1
          venv-web\Scripts\pip install --no-input -r requirements.txt pyinstaller || exit /b 1
      - name: Build installer
        shell: cmd
        run: build_installer.bat
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/AetherHE-Setup.exe
            dist/AetherHE-windows.zip
          if-no-files-found: error

  # ------------------------------------------------------------------- Linux --
  linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      # Builds against org.gnome.Platform//49 (pulled from flathub at build
      # time if the image doesn't already cache it) and emits a single-file
      # bundle. Network is enabled in the manifest's build-args for pip.
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: AetherHE.flatpak
          manifest-path: flatpak/io.github.mrwhosnexus.AetherHE.yml
          cache-key: flatpak-builder-${{ github.sha }}
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: AetherHE.flatpak
          if-no-files-found: error

  # ----------------------------------------------------------------- Release --
  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/windows/AetherHE-Setup.exe
            artifacts/windows/AetherHE-windows.zip
            artifacts/linux/AetherHE.flatpak
